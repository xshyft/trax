apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Chart.Name }}
    version: "{{ .Chart.AppVersion }}"
    affinity-group: "2"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
        version: "{{ .Chart.AppVersion }}"
        affinity-group: "2"
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values: ["traxcoord1", "traxcoord2", "traxcoord3"]
            topologyKey: kubernetes.io/hostname
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: affinity-group
                operator: In
                values: ["2"]
      containers:
        - name: {{ .Chart.Name }}
          {{- $imageTag := .Values.traxcoord2.image.tag }}
          {{- if not $imageTag }}
            {{- $imageTag = .Values.global.tag }}
          {{- end }}
          {{- if .Values.traxcoord2.image.registry }}
          image: "{{ .Values.traxcoord2.image.registry }}/{{ .Values.traxcoord2.image.repository }}:{{ $imageTag }}"
          {{- else }}
          image: "{{ .Values.traxcoord2.image.repository }}:{{ $imageTag }}"
          {{- end }}
          imagePullPolicy: {{ .Values.traxcoord2.image.pullPolicy }}
          args:
            - traxcoord
          ports:
            - name: api
              containerPort: 17201
              protocol: TCP
          env:
            - name: POSTGRESQL_CONN_STRING
              value: {{ .Values.traxcoord2.env.postgresqlConnString | quote }}
            - name: RABBITMQ_CONN_STRING
              value: {{ .Values.traxcoord2.env.rabbitmqConnString | quote }}
            - name: RABBITMQ_MAX_CHANNELS
              value: {{ .Values.traxcoord2.env.rabbitmqMaxChannels | quote }}
            - name: REDIS_ADDRESS
              value: {{ .Values.traxcoord2.env.redisAddress | quote }}
            - name: TRAX_COORDINATOR_ID
              value: "traxcoord2"
            - name: TRAX_COORDINATOR_AFFINITY_GROUP
              value: "2"
          resources:
            {{- toYaml .Values.traxcoord2.resources | nindent 12 }}
          lifecycle:
            postStart:
              exec:
                command: ["/bin/sh", "-c", "sleep 30"]
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: api
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: api
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 3
