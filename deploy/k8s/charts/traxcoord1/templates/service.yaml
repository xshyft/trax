apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Chart.Name }}
    version: "{{ .Chart.AppVersion }}"
spec:
  type: {{ .Values.traxcoord1.service.type }}
  ports:
    - port: {{ .Values.traxcoord1.service.port }}
      targetPort: {{ .Values.traxcoord1.service.targetPort }}
      protocol: TCP
      name: api
  selector:
    app: {{ .Chart.Name }}