version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agora_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agora_db"]
      interval: 2s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 10s
      retries: 10
    ports:
      - "5672:5672"
      - "15672:15672"

  init-db:
    image: postgres:15
    command: >
      bash -c "
      psql -h postgres -U postgres -d agora_db -f /scripts/init_shared_pgsql.sql &&
      psql -h postgres -U postgres -d agora_db -f /scripts/init_trax_pgsql.sql &&
      psql -h postgres -U postgres -d agora_db -f /scripts/init_laser_pgsql.sql &&
      psql -h postgres -U postgres -d agora_db -f /scripts/init_instrmgr_pgsql.sql &&
      psql -h postgres -U postgres -d agora_db -f /scripts/init_test_cluster.sql
      "
    environment:
      PGPASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../../deploy/k8s/init/init_shared_pgsql.sql:/scripts/init_shared_pgsql.sql:ro
      - ../../../deploy/k8s/init/init_trax_pgsql.sql:/scripts/init_trax_pgsql.sql:ro
      - ../../../deploy/k8s/init/init_laser_pgsql.sql:/scripts/init_laser_pgsql.sql:ro
      - ../../../deploy/k8s/init/init_instrmgr_pgsql.sql:/scripts/init_instrmgr_pgsql.sql:ro
      - ./init_test_cluster.sql:/scripts/init_test_cluster.sql:ro

  traxctrl:
    image: localhost:5555/trax.daemons:${BRANCH_TAG:-latest}
    command: ["traxctrl"]
    environment:
      POSTGRESQL_CONN_STRING: "postgres://postgres:postgres@postgres:5432/agora_db?sslmode=disable"
      RABBITMQ_CONN_STRING: "amqp://guest:guest@rabbitmq:5672/"
      REDIS_ADDRESS: redis:6379
      TRAX_CLUSTER_ID: "e2e_test_cluster"
      DEPLOYMENT_ENV_TYPE: "e2e-test"
      DEPLOYMENT_ENV_LEGAL_TYPE: "csd"
      LOG_LEVEL: debug
      ENABLE_TESTING_ENDPOINTS: "true"
      RABBITMQ_MAX_CHANNELS: "300"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      init-db:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:17202/api/v1/health"]
      interval: 2s
      timeout: 3s
      retries: 20
    ports:
      - "17200:17202"

  traxcoord1:
    image: localhost:5555/trax.daemons:${BRANCH_TAG:-latest}
    command: ["traxcoord"]
    environment:
      POSTGRESQL_CONN_STRING: "postgres://postgres:postgres@postgres:5432/agora_db?sslmode=disable"
      RABBITMQ_CONN_STRING: "amqp://guest:guest@rabbitmq:5672/"
      REDIS_ADDRESS: redis:6379
      TRAX_CLUSTER_ID: "e2e_test_cluster"
      TRAX_COORDINATOR_AFFINITY_GROUP: "1"
      LOG_LEVEL: debug
      ENABLE_TESTING_ENDPOINTS: "true"
      RABBITMQ_MAX_CHANNELS: "300"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      init-db:
        condition: service_completed_successfully
      traxctrl:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:17201/api/v1/health"]
      interval: 2s
      timeout: 3s
      retries: 20
    ports:
      - "17220:17201"

  traxcoord2:
    image: localhost:5555/trax.daemons:${BRANCH_TAG:-latest}
    command: ["traxcoord"]
    environment:
      POSTGRESQL_CONN_STRING: "postgres://postgres:postgres@postgres:5432/agora_db?sslmode=disable"
      RABBITMQ_CONN_STRING: "amqp://guest:guest@rabbitmq:5672/"
      REDIS_ADDRESS: redis:6379
      TRAX_CLUSTER_ID: "e2e_test_cluster"
      TRAX_COORDINATOR_AFFINITY_GROUP: "2"
      LOG_LEVEL: debug
      ENABLE_TESTING_ENDPOINTS: "true"
      RABBITMQ_MAX_CHANNELS: "300"
    depends_on:
